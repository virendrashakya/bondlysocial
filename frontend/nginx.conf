server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API calls (optional — use if same-origin needed)
  # location /api/ {
  #   proxy_pass http://api:3001;
  # }

  gzip on;
  gzip_types text/css application/javascript application/json;
}
