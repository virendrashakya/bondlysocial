services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-intentconnect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prodpassword123}
      POSTGRES_DB: ${POSTGRES_DB:-intentconnect_production}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intentconnect -d intentconnect_production"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      bash -c "
        bundle exec rails db:prepare &&
        bundle exec rails server -b 0.0.0.0 -p 3000
      "
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"
      DATABASE_URL: postgres://${POSTGRES_USER:-intentconnect}:${POSTGRES_PASSWORD:-prodpassword123}@db:5432/${POSTGRES_DB:-intentconnect_production}
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-replace_me_with_rake_secret_in_production_000000000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      S3_BUCKET: ${S3_BUCKET:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_storage_prod:/app/storage
    restart: unless-stopped

  sidekiq:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: bundle exec sidekiq -C config/sidekiq.yml
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-intentconnect}:${POSTGRES_PASSWORD:-prodpassword123}@db:5432/${POSTGRES_DB:-intentconnect_production}
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-replace_me_with_rake_secret_in_production_000000000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      S3_BUCKET: ${S3_BUCKET:-}
    depends_on:
      - api
      - redis
    volumes:
      - backend_storage_prod:/app/storage
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Nginx routes the API/websocket internally via reverse proxy,
        # so relative paths flawlessly map to the frontend's deployed domain!
        VITE_API_BASE_URL: /api/v1
        VITE_WS_URL: /cable
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data_prod:
  backend_storage_prod:
